<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- PLACEHOLDER street sign (not a photo). A green highway sign with real text
       so the Describe "Read text" (OCR) mode has something to transcribe. Adam can
       drop a real CC0 street/sign photo in as street-sign.png/.jpg and update
       SAMPLES in app.js. -->
  <rect width="512" height="512" fill="#1a2a1e"/>
  <rect width="512" height="200" fill="#2a3d52"/>
  <rect x="244" y="150" width="24" height="362" fill="#555b66"/>
  <rect x="90" y="120" width="332" height="150" rx="10" fill="#1f6b3a"/>
  <rect x="98" y="128" width="316" height="134" rx="8" fill="none" stroke="#f2f5fa" stroke-width="3"/>
  <text x="256" y="180" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif"
        font-size="34" font-weight="700" fill="#f2f5fa">MAIN ST</text>
  <text x="256" y="228" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif"
        font-size="26" fill="#f2f5fa">Exit 12 · 1/2 MILE</text>
  <text x="256" y="470" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif"
        font-size="20" fill="#9aa5b8">sample placeholder — read the text</text>
</svg>
